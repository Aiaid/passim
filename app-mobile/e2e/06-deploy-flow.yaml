# US-10.3: Deploy app from marketplace
# Verifies the deploy flow: Apps tab → Deploy → template list →
# select template → configure → confirm deployment.

appId: io.passim.app
env:
  TEST_HOST: "localhost:8443"
  TEST_API_KEY: ""
---
# Start from a connected dashboard
- runFlow: helpers/setup-node.yaml

# Navigate to the Apps tab
- tapOn: "Apps"

# Tap the deploy button to open the marketplace/template list
- tapOn:
    id: "btn-deploy"

# Template list should appear
- extendedWaitUntil:
    visible:
      id: "template-list"
    timeout: 10000

# Select a template (WireGuard is the primary app template)
- tapOn:
    id: "template-wireguard"
    optional: true

# If template-wireguard is not found, tap the first visible template
- tapOn:
    text: ".*"
    index: 0
    optional: true

# The deploy confirmation button should appear after selecting a template
- extendedWaitUntil:
    visible:
      id: "btn-deploy-confirm"
    timeout: 5000

# Confirm the deployment
- tapOn:
    id: "btn-deploy-confirm"

# Wait for deployment to complete and return to the apps list
- extendedWaitUntil:
    visible:
      id: "app-list"
    timeout: 30000
