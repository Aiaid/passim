# Reusable subflow: Add a test node
# Used as a prerequisite by other test flows via runFlow.
# Clears app state, launches fresh, and connects to a test node
# using the manual entry flow.

appId: io.passim.app
env:
  TEST_HOST: "localhost:8443"
  TEST_API_KEY: ""
---
- launchApp:
    clearState: true

# Welcome screen should appear on fresh launch
- assertVisible: "Passim"

# Use the manual entry flow
- tapOn:
    id: "btn-manual-entry"

# Fill in the connection form
- tapOn:
    id: "input-host"
- inputText: ${TEST_HOST}

- tapOn:
    id: "input-api-key"
- inputText: ${TEST_API_KEY}

# Connect to the node
- tapOn:
    id: "btn-connect"

# Wait for successful connection and dashboard to appear
- extendedWaitUntil:
    visible:
      id: "dashboard-title"
    timeout: 10000
