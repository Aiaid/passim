name: samba
category: storage
version: 1.0.0
icon: hard-drive
description:
  en-US: "Samba file sharing server for local network access"
  zh-CN: "Samba 文件共享服务器，用于局域网文件访问"
source:
  url: https://github.com/dperson/samba
  license: ISC
limitations:
  - "Best suited for local network use; not recommended over the internet without a VPN"
  - "SMB ports (139, 445) may be blocked by ISPs or firewalls"
settings:
  - key: username
    type: string
    default: "user"
    label:
      en-US: "Username"
      zh-CN: "用户名"
    description:
      en-US: "Samba authentication username"
      zh-CN: "Samba 认证用户名"
  - key: password
    type: string
    default: "{{generated.password}}"
    label:
      en-US: "Password"
      zh-CN: "密码"
    description:
      en-US: "Samba authentication password"
      zh-CN: "Samba 认证密码"
  - key: share_name
    type: string
    default: "share"
    label:
      en-US: "Share Name"
      zh-CN: "共享名称"
    description:
      en-US: "Name of the Samba share visible on the network"
      zh-CN: "网络上可见的 Samba 共享名称"
generated:
  - key: password
    type: random_string
    length: 16
container:
  image: dperson/samba
  ports:
    - "139:139"
    - "445:445"
  volumes:
    - "{{node.data_dir}}/files/samba:/mount"
  environment: {}
  labels:
    io.passim: storage
    io.passim.app: samba
  args:
    - "-u"
    - "{{settings.username}};{{settings.password}}"
    - "-s"
    - "{{settings.share_name}};/mount;yes;no;no;{{settings.username}}"
clients:
  type: credentials
  fields:
    - key: server
      label:
        en-US: "Server"
        zh-CN: "服务器"
      value: "smb://{{node.public_ip}}/{{settings.share_name}}"
    - key: username
      label:
        en-US: "Username"
        zh-CN: "用户名"
      value: "{{settings.username}}"
    - key: password
      label:
        en-US: "Password"
        zh-CN: "密码"
      value: "{{settings.password}}"
      secret: true
guide:
  setup:
    en-US: "Set a username, password, and share name. The share will be accessible on your local network."
    zh-CN: "设置用户名、密码和共享名称。共享将在局域网内可访问。"
  usage:
    en-US: "Connect from Windows (\\\\server-ip\\share), macOS (Finder > Connect to Server > smb://server-ip/share), or Linux (mount -t cifs)."
    zh-CN: "从 Windows (\\\\服务器IP\\共享名)、macOS (Finder > 连接服务器 > smb://服务器IP/共享名) 或 Linux (mount -t cifs) 连接。"
  platforms:
    - name: Windows
      steps:
        - "Open File Explorer"
        - "Enter \\\\server-ip\\share in the address bar"
        - "Enter username and password"
    - name: macOS
      steps:
        - "Finder → Go → Connect to Server"
        - "Enter smb://server-ip/share"
    - name: Linux
      steps:
        - "Run: mount -t cifs //server-ip/share /mnt -o username=user"
