name: wireguard
category: vpn
version: 1.0.0
icon: shield
description:
  en-US: "Peer-to-peer VPN using WireGuard protocol"
  zh-CN: "基于 WireGuard 协议的点对点 VPN"
source:
  url: https://github.com/linuxserver/docker-wireguard
  license: GPL-2.0
limitations:
  - "Requires NET_ADMIN and SYS_MODULE capabilities"
  - "Host must have WireGuard kernel module support or wireguard-tools installed"
  - "UDP port 51820 must not be blocked by firewall"
settings:
  - key: peers
    type: number
    min: 1
    max: 25
    default: 1
    label:
      en-US: "Number of Peers"
      zh-CN: "对等节点数"
    description:
      en-US: "How many peer config files to generate"
      zh-CN: "要生成多少个对等节点配置文件"
container:
  image: linuxserver/wireguard
  ports:
    - "51820:51820/udp"
  volumes:
    - "{{app.dir}}/configs:/config"
  environment:
    PEERS: "{{settings.peers}}"
  labels:
    io.passim: vpn
    io.passim.app: wireguard
  cap_add:
    - NET_ADMIN
    - SYS_MODULE
  sysctls:
    net.ipv4.conf.all.src_valid_mark: "1"
clients:
  type: file_per_user
  source: "/config/peer{n}/peer{n}.conf"
  format: conf
  qr: true
share:
  supports: true
  per_user: true
  share_content: [client_config, guide]
guide:
  setup:
    en-US: "Set the number of peers and start the server. Config files are generated automatically for each peer."
    zh-CN: "设置对等节点数并启动服务器。每个节点的配置文件会自动生成。"
  usage:
    en-US: "Download the generated .conf file or scan the QR code, then import it into your WireGuard client app."
    zh-CN: "下载生成的 .conf 文件或扫描二维码，然后导入 WireGuard 客户端应用。"
  platforms:
    - name: iOS
      store_url: "https://apps.apple.com/app/wireguard/id1441195209"
      steps:
        - "Install WireGuard from the App Store"
        - "Tap + and scan the QR code or import the .conf file"
    - name: Android
      store_url: "https://play.google.com/store/apps/details?id=com.wireguard.android"
      steps:
        - "Install WireGuard from Google Play"
        - "Tap + and import from file or scan QR code"
    - name: Windows
      download_url: "https://download.wireguard.com/windows-client/wireguard-installer.exe"
      steps:
        - "Download and install WireGuard"
        - "Click Import tunnel(s) from file"
    - name: macOS
      store_url: "https://apps.apple.com/app/wireguard/id1451685025"
      steps:
        - "Install WireGuard from the App Store"
        - "Click Import Tunnel(s) from File"
