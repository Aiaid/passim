name: webdav
category: storage
version: 1.0.0
icon: folder
description:
  en-US: "WebDAV file server for remote file access"
  zh-CN: "WebDAV 文件服务器，用于远程文件访问"
source:
  url: https://github.com/BytemarkHosting/docker-webdav
  license: MIT
limitations:
  - "No built-in TLS; use a reverse proxy for HTTPS in production"
  - "Digest authentication only; does not support OAuth or token-based auth"
settings:
  - key: username
    type: string
    default: "admin"
    label:
      en-US: "Username"
      zh-CN: "用户名"
    description:
      en-US: "WebDAV authentication username"
      zh-CN: "WebDAV 认证用户名"
  - key: password
    type: string
    default: "{{generated.password}}"
    label:
      en-US: "Password"
      zh-CN: "密码"
    description:
      en-US: "WebDAV authentication password"
      zh-CN: "WebDAV 认证密码"
generated:
  - key: password
    type: random_string
    length: 20
container:
  image: bytemark/webdav
  ports:
    - "8080:80"
  volumes:
    - "{{node.data_dir}}/files/webdav:/var/lib/dav"
  environment:
    AUTH_TYPE: "Digest"
    USERNAME: "{{settings.username}}"
    PASSWORD: "{{settings.password}}"
  labels:
    io.passim: storage
    io.passim.app: webdav
clients:
  type: credentials
  fields:
    - key: url
      label:
        en-US: "WebDAV URL"
        zh-CN: "WebDAV 地址"
      value: "http://{{node.public_ip}}:8080"
    - key: username
      label:
        en-US: "Username"
        zh-CN: "用户名"
      value: "{{settings.username}}"
    - key: password
      label:
        en-US: "Password"
        zh-CN: "密码"
      value: "{{settings.password}}"
      secret: true
guide:
  setup:
    en-US: "Set a username and password. Files are stored in the mounted data volume."
    zh-CN: "设置用户名和密码。文件存储在挂载的数据卷中。"
  usage:
    en-US: "Connect using any WebDAV client (Windows Explorer, macOS Finder, Cyberduck) with the server URL, username, and password."
    zh-CN: "使用任意 WebDAV 客户端（Windows 资源管理器、macOS Finder、Cyberduck）通过服务器 URL、用户名和密码连接。"
  platforms:
    - name: iOS
      steps:
        - "Open the Files app"
        - "Tap ... → Connect to Server"
        - "Enter the WebDAV URL and credentials"
    - name: macOS
      steps:
        - "Finder → Go → Connect to Server"
        - "Enter the WebDAV URL"
    - name: Windows
      steps:
        - "Open File Explorer"
        - "Right-click This PC → Map Network Drive"
        - "Enter the WebDAV URL"
