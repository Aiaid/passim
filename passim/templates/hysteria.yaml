name: hysteria
category: vpn
version: 1.0.0
icon: zap
description:
  en-US: "Hysteria 2 proxy — fast, censorship-resistant QUIC-based protocol"
  zh-CN: "Hysteria 2 代理 — 基于 QUIC 的快速抗审查协议"
source:
  url: https://github.com/apernet/hysteria
  license: MIT
limitations:
  - "Uses UDP; some networks may block or throttle UDP traffic"
settings:
  - key: port
    type: number
    min: 1
    max: 65535
    default: 443
    label:
      en-US: "Listen Port"
      zh-CN: "监听端口"
    description:
      en-US: "UDP port the server listens on"
      zh-CN: "服务器监听的 UDP 端口"
  - key: password
    type: string
    default: "{{generated.password}}"
    label:
      en-US: "Password"
      zh-CN: "密码"
    description:
      en-US: "Authentication password for clients"
      zh-CN: "客户端认证密码"
generated:
  - key: password
    type: random_string
    length: 32
container:
  image: tobyxdd/hysteria
  ports:
    - "{{settings.port}}:443/udp"
  volumes:
    - "{{app.dir}}/configs:/etc/hysteria"
    - "{{node.data_dir}}/ssl/shared:/etc/passim-ssl:ro"
  environment: {}
  labels:
    io.passim: vpn
    io.passim.app: hysteria
  args:
    - "server"
    - "-c"
    - "/etc/hysteria/config.yaml"
clients:
  type: url
  urls:
    - name: "Hysteria 2"
      scheme: "hysteria2://{{settings.password}}@{{node.public_ip}}:{{settings.port}}/?insecure=1#{{node.hostname}}"
      qr: true
  import_urls:
    stash: "stash://install-config?url={{subscribe_url}}"
    shadowrocket: "sub://{{base64_subscribe_url}}"
share:
  supports: true
  share_content: [client_config, guide]
guide:
  setup:
    en-US: "Set the listening port and password. A random password is generated by default. TLS certificate is shared from Passim automatically."
    zh-CN: "设置监听端口和密码。默认会自动生成随机密码。TLS 证书自动从 Passim 共享。"
  usage:
    en-US: "Install the Hysteria 2 client, configure it with the server address, port, and password, then connect."
    zh-CN: "安装 Hysteria 2 客户端，使用服务器地址、端口和密码进行配置，然后连接。"
  platforms:
    - name: iOS
      steps:
        - "Install Stash or Shadowrocket"
        - "Scan the QR code to import"
    - name: Android
      steps:
        - "Install NekoBox or Clash Meta"
        - "Scan the QR code or paste the subscription URL"
    - name: Windows
      steps:
        - "Download Clash Verge"
        - "Paste the subscription URL to import"
    - name: macOS
      steps:
        - "Install Stash from the App Store"
        - "Paste the subscription URL to import"
config:
  files:
    - path: "config.yaml"
      template: |
        listen: :443
        tls:
          cert: /etc/passim-ssl/cert.pem
          key: /etc/passim-ssl/key.pem
        auth:
          type: password
          password: {{settings.password}}
        masquerade:
          type: proxy
          proxy:
            url: https://news.ycombinator.com/
            rewriteHost: true
