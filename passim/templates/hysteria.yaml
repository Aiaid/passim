name: hysteria
category: vpn
version: 1.0.0
icon: zap
description:
  en-US: "Hysteria 2 proxy — fast, censorship-resistant QUIC-based protocol"
  zh-CN: "Hysteria 2 代理 — 基于 QUIC 的快速抗审查协议"
source:
  url: https://github.com/apernet/hysteria
  license: MIT
guide:
  setup:
    en-US: "Set the listening port and password. A random password is generated by default. Optionally provide a domain for TLS certificates."
    zh-CN: "设置监听端口和密码。默认会自动生成随机密码。可选提供域名以获取 TLS 证书。"
  usage:
    en-US: "Install the Hysteria 2 client, configure it with the server address, port, and password, then connect."
    zh-CN: "安装 Hysteria 2 客户端，使用服务器地址、端口和密码进行配置，然后连接。"
limitations:
  - "Uses UDP; some networks may block or throttle UDP traffic"
  - "Self-signed TLS is used when no domain is provided (clients must set insecure mode)"
settings:
  - key: port
    type: number
    min: 1
    max: 65535
    default: 443
    label:
      en-US: "Listen Port"
      zh-CN: "监听端口"
    description:
      en-US: "UDP port the server listens on"
      zh-CN: "服务器监听的 UDP 端口"
  - key: password
    type: string
    default: "{{generated.password}}"
    label:
      en-US: "Password"
      zh-CN: "密码"
    description:
      en-US: "Authentication password for clients"
      zh-CN: "客户端认证密码"
  - key: domain
    type: string
    default: ""
    advanced: true
    label:
      en-US: "Domain (optional)"
      zh-CN: "域名（可选）"
    description:
      en-US: "Domain name for automatic TLS certificate via ACME. Leave empty for self-signed."
      zh-CN: "用于 ACME 自动获取 TLS 证书的域名。留空则使用自签证书。"
generated:
  - key: password
    type: random_string
    length: 32
container:
  image: tobyxdd/hysteria
  ports:
    - "{{settings.port}}:443/udp"
  volumes:
    - "{{node.data_dir}}/configs/hysteria:/etc/hysteria"
  environment: {}
  labels:
    io.passim: vpn
    io.passim.app: hysteria
  args:
    - "server"
    - "-c"
    - "/etc/hysteria/config.yaml"
config:
  files:
    - path: "{{node.data_dir}}/configs/hysteria/config.yaml"
      template: |
        listen: :443
        auth:
          type: password
          password: {{settings.password}}
        masquerade:
          type: proxy
          proxy:
            url: https://news.ycombinator.com/
            rewriteHost: true
